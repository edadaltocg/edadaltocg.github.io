name: pre-commit

on:
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Node tools
        run: npm install -g prettier bibtex-tidy markdownlint-cli2

      - uses: pre-commit/action@v3.0.1
