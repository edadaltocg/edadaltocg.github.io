name: pre-commit

on:
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install taplo
        run: |
          VERSION=$(curl -fsSL https://api.github.com/repos/tamasfe/taplo/releases/latest \
            | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
          curl -fsSL "https://github.com/tamasfe/taplo/releases/download/${VERSION}/taplo-full-linux-x86_64.gz" \
            | gunzip -c > /usr/local/bin/taplo
          chmod +x /usr/local/bin/taplo

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Node tools
        run: npm install -g prettier bibtex-tidy markdownlint-cli2

      - uses: pre-commit/action@v3.0.1
