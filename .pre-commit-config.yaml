repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: [--fix]

  - repo: local
    hooks:
      - id: taplo
        name: taplo fmt
        language: rust
        entry: taplo fmt
        types: [toml]
        additional_dependencies: [taplo-cli]

      - id: bibtex-tidy
        name: bibtex-tidy
        language: node
        additional_dependencies: [bibtex-tidy]
        entry: bibtex-tidy --modify
        files: \.bib$
